<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GP-Nunes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="profile-card">
      <button class="theme-btn" id="themeToggle" aria-label="Alternar tema">
        <span class="icon-slot" id="themeToggleIcon" aria-hidden="true">
          <i data-lucide="moon"></i>
        </span>
      </button>

      <div class="avatar-wrap">
        <img
          class="avatar"
          src="img/perfil.jpg"
          alt="Foto de perfil"
        />
      </div>

      <span class="badge">Conheça</span>
      <h1>GP-Nunes</h1>
      <p class="bio">
        links principais YouTube e TikTok.
      </p>

      <section class="music-panel" aria-label="Controle de musica">
        <div class="music-controls">
          <button class="music-btn music-toggle" id="musicToggle" type="button" aria-label="Tocar musica" title="Tocar musica">
            <span class="icon-slot" id="musicToggleIcon" aria-hidden="true">
              <i data-lucide="play"></i>
            </span>
          </button>
          <button class="music-btn" id="volumeDown" type="button" aria-label="Diminuir volume" title="Diminuir volume">
            <span class="icon-slot" id="volumeDownIcon" aria-hidden="true">
              <i data-lucide="minus"></i>
            </span>
          </button>
          <div class="volume-meter" aria-hidden="true">
            <span class="volume-fill" id="volumeFill"></span>
          </div>
          <button class="music-btn" id="volumeUp" type="button" aria-label="Aumentar volume" title="Aumentar volume">
            <span class="icon-slot" id="volumeUpIcon" aria-hidden="true">
              <i data-lucide="plus"></i>
            </span>
          </button>
        </div>
        <p class="music-status" id="musicStatus">Volume 10%</p>
      </section>
    </section>

    <section class="links-card" aria-label="Links principais">
      <a class="link-item" href="https://www.youtube.com/@paarkml." aria-label="YouTube" target="_blank" rel="noopener noreferrer">
        <img
          class="link-media"
          src="img/park.jpg"
          alt=""
        />
        <div class="link-copy">
          <strong>YouTube</strong>
        </div>
        <small>&#8599;</small>
      </a>

      <a class="link-item" href="https://www.tiktok.com/@mach6904" aria-label="TikTok" target="_blank" rel="noopener noreferrer">
        <img
          class="link-media"
          src="img/mach.jpg"
          alt=""
        />
        <div class="link-copy">
          <strong>TikTok</strong>
        </div>
        <small>&#8599;</small>
      </a>
    </section>

    <footer class="footer">
      <p>&copy; 2026 &bull; ManoelNunes</p>
    </footer>
  </main>

  <audio id="backgroundMusic" loop preload="auto">
    <source src="sound/waeraHarinezumi.mp3" type="audio/mpeg" />
  </audio>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
